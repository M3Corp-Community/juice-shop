# Python package
# Create and test a Python package on multiple Python versions.
# Add steps that analyze code, save the dist with the build record,
# publish to a PyPI-compatible index, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/python

trigger:
  - master

variables:
  - group: Veracode

pool:
  vmImage: ubuntu-latest

steps:
  - script: |
      set -euo pipefail

      ORIGINAL_DIR=$(pwd)
      PACKAGE_PATH="$(caminhoPacote)"

      if [[ "$PACKAGE_PATH" != /* ]]; then
        PACKAGE_PATH="$ORIGINAL_DIR/$PACKAGE_PATH"
      fi

      mkdir -p "$(dirname "$PACKAGE_PATH")"
      rm -f "$PACKAGE_PATH"

      TEMP_DIR=$(mktemp -d)
      trap 'rm -rf "$TEMP_DIR"' EXIT

      echo "Copiando arquivos fonte..."
      find . -type f \
        \( \
          -iname "*.py" -o \
          -iname "*.html" -o \
          -iname "*.htm" -o \
          -iname "*.asp" -o \
          -iname "*.cjs" -o \
          -iname "*.css" -o \
          -iname "*.ehtml" -o \
          -iname "*.es" -o \
          -iname "*.es6" -o \
          -iname "*.handlebars" -o \
          -iname "*.hbs" -o \
          -iname "*.hjs" -o \
          -iname "*.js" -o \
          -iname "*.jsx" -o \
          -iname "*.json" -o \
          -iname "*.jsp" -o \
          -iname "*.jspx" -o \
          -iname "*.java" -o \
          -iname "*.map" -o \
          -iname "*.mjs" -o \
          -iname "*.mustache" -o \
          -iname "*.ts" -o \
          -iname "*.tsx" -o \
          -iname "*.vue" -o \
          -iname "*.xhtml" -o \
          -iname "*.lock" -o \
          -iname "*.module" -o \
          -iname "*.inc" -o \
          -iname "*.profile" -o \
          -iname "*.install" -o \
          -iname "*.engine" -o \
          -iname "*.theme" -o \
          -iname "*.php4" -o \
          -iname "*.php5" -o \
          -iname "*.php7" -o \
          -iname "*.phtml" -o \
          -iname "*.txt" \
        \) \
        ! -path "*/node_modules/*" \
        ! -path "*/.git/*" \
        -exec cp --parents {} "$TEMP_DIR" \;

      echo "Selecionando assemblies .NET com PDB..."
      declare -A SELECTED_DLL
      declare -A SELECTED_SCORE

      while IFS= read -r -d '' dllFile; do
        pdbFile="${dllFile%.dll}.pdb"

        if [[ ! -f "$pdbFile" ]]; then
          continue
        fi

        dllName=$(basename "$dllFile")
        dllKey=$(printf '%s' "$dllName" | tr '[:upper:]' '[:lower:]')
        dllMtime=$(stat -c %Y "$dllFile")
        pathScore=0

        case "$dllFile" in
          */bin/Release/*|*/bin/release/*)
            pathScore=2
            ;;
          */bin/*)
            pathScore=1
            ;;
        esac

        score="${pathScore}${dllMtime}"

        if [[ -z "${SELECTED_SCORE[$dllKey]+x}" || "$score" -gt "${SELECTED_SCORE[$dllKey]}" ]]; then
          SELECTED_DLL[$dllKey]="$dllFile"
          SELECTED_SCORE[$dllKey]="$score"
        fi
      done < <(
        find . -type f -name "*.dll" \
          ! -iname "*Microsoft*" \
          ! -iname "*UnitTest*" \
          ! -iname "*Xunit*" \
          ! -iname "*Test*" \
          ! -path "*/obj/*" \
          ! -path "*/ref/*" \
          ! -path "*/refint/*" \
          ! -path "*/node_modules/*" \
          ! -path "*/.git/*" \
          ! -path "*/TestResults/*" \
          -print0
      )

      for dllKey in "${!SELECTED_DLL[@]}"; do
        dllFile="${SELECTED_DLL[$dllKey]}"
        pdbFile="${dllFile%.dll}.pdb"

        cp --parents "$dllFile" "$TEMP_DIR"
        cp --parents "$pdbFile" "$TEMP_DIR"

        for ext in deps.json runtimeconfig.json; do
          auxFile="${dllFile%.dll}.${ext}"
          [ -f "$auxFile" ] && cp --parents "$auxFile" "$TEMP_DIR"
        done

        webConfig="$(dirname "$dllFile")/web.config"
        [ -f "$webConfig" ] && cp --parents "$webConfig" "$TEMP_DIR"
      done

      cd "$TEMP_DIR"
      zip -r "$PACKAGE_PATH" .

      echo "ZIP criado:"
      ls -lh "$PACKAGE_PATH"
    displayName: 'Preparar pacote Veracode unificado'

  - script: |
      LATEST_VERSION=$(curl -s https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
      curl -L -o veracode-wrapper.jar "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${LATEST_VERSION}/vosp-api-wrappers-java-${LATEST_VERSION}.jar"
    displayName: 'Download Veracode Wrapper'

  - script: |
      if [[ "$(Build.SourceBranchName)" == "main" || "$(Build.SourceBranchName)" == "master" ]]; then
        java -jar veracode-wrapper.jar \
          -vid $(VERACODE_API_KEY_ID) \
          -vkey $(VERACODE_API_KEY_SECRET) \
          -action uploadandscan \
          -appname "$(Build.DefinitionName)" \
          -createprofile true \
          -version $(Build.BuildNumber) \
          -filepath $(caminhoPacote) \
          -deleteincompletescan 2 \
          -teams "$(veracodeTeams)"
      else
        java -jar veracode-wrapper.jar \
          -vid $(VERACODE_API_KEY_ID) \
          -vkey $(VERACODE_API_KEY_SECRET) \
          -action uploadandscan \
          -appname "$(Build.DefinitionName)" \
          -createprofile true \
          -version $(Build.BuildNumber) \
          -filepath $(caminhoPacote) \
          -createsandbox true \
          -sandboxname "$(Build.SourceBranchName)" \
          -deleteincompletescan 2 \
          -teams "$(veracodeTeams)"
      fi
    displayName: 'Veracode U&S'
    continueOnError: true

  - script: |
      curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    displayName: 'Download Veracode CLI'

  - script: |
      curl -sSL https://download.srcclr.com/ci.sh | bash -s -- scan --update-advisor --allow-dirty --recursive
    displayName: 'Veracode SCA'
    continueOnError: true

  - script: |
      ORIGINAL_DIR=$(pwd)
      PARENT_DIR=$(dirname "$ORIGINAL_DIR")
      ORIGINAL_NAME=$(basename "$ORIGINAL_DIR")
      PIPELINE_DIR="$(Build.DefinitionName)"

      cd "$PARENT_DIR"
      mv "$ORIGINAL_NAME" "$PIPELINE_DIR"
      cd "$PIPELINE_DIR"

      echo "pasta: $(pwd)"

      ./veracode scan \
        --type directory \
        --source "$(pwd)" \
        --format table

      cd "$PARENT_DIR"
      mv "$PIPELINE_DIR" "$ORIGINAL_NAME"
      cd "$ORIGINAL_DIR"
    displayName: 'Veracode IaC'
    continueOnError: true

  - script: |
      ./veracode static scan "$(caminhoPacote)"
    displayName: 'Veracode SAST'
    continueOnError: true